server.port=${SERVER_PORT:8787}
spring.application.name=graymatter-local-server
spring.datasource.url=${GRAYMATTER_DB_URL:jdbc:h2:file:./data/graymatter;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${GRAYMATTER_DB_USERNAME:sa}
spring.datasource.password=${GRAYMATTER_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.h2.console.enabled=false
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
graymatter.admin.username=${GRAYMATTER_ADMIN_USERNAME:admin}
graymatter.admin.password=${GRAYMATTER_ADMIN_PASSWORD:graymatter-local}
graymatter.admin.display-name=${GRAYMATTER_ADMIN_DISPLAY_NAME:GrayMatter Admin}
